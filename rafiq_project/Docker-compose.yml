services:

  emotion_service:
    build: ./journal_emotion_service
    container_name: emotion_model
    ports:
      - "5001:5000"
    restart: always

  django_backend:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    depends_on:
      - emotion_service
    volumes:
      - .:/app
    environment:
      - AI_SERVICE_URL=http://emotion_model:5000/predict
    restart: always